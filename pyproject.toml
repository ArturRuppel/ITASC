[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cellflow"
version = "0.2.0"
description = "Fast, interactive, hypothesis-driven cell tracking"
requires-python = ">=3.9"
license = {text = "GPL-3.0"}
authors = [{name = "Artur Ruppel"}]
dependencies = [
    "napari[all]>=0.4.18",
    "qtpy>=2.3.0",
    "h5py",
    "numpy",
    "scipy",
    "scikit-image",
    "pandas",
    "tifffile",
    "numba",
    "matplotlib>=3.9.4",
    "pymaxflow>=1.3.2",
    "pydantic",
    "sqlalchemy",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.11",
]

[project.entry-points."napari.manifest"]
cellflow = "cellflow:napari.yaml"

[project.scripts]
cellflow-classify-nls = "cellflow.contact_analysis.nls_classification:main"

[tool.hatch.build.targets.wheel]
packages = ["src/cellflow"]

[tool.hatch.build.targets.wheel.shared-data]
"src/cellflow/napari.yaml" = "cellflow/napari.yaml"

[tool.ruff]
target-version = "py39"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "F401",
    "F811",
]
