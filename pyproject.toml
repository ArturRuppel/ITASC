[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cellflow"
version = "0.1.0"
description = "A napari plugin for cell segmentation, tracking, and tissue topology analysis"
requires-python = ">=3.9"
license = {text = "GPL-3.0"}
authors = [
    {name = "Artur Ruppel"}
]
dependencies = [
    "numpy>=1.24.0",
    "scipy>=1.10.0",
    "scikit-image>=0.20.0",
    "networkx>=3.0",
    "matplotlib>=3.7.0",
    "opencv-python>=4.7.0",
    "pandas>=1.5.0",
    "napari[all]>=0.4.18",
    "qtpy>=2.3.0",
    "cellpose>=3.1.0",
    "laptrack>=0.14.0",
    "tifffile>=2024.1.1",
    "PyYAML>=6.0",
]

[project.optional-dependencies]
dashboard = [
    "dash>=2.14.0",
    "plotly>=5.18.0",
]
forces = [
    "forsys>=1.0.0",
]
dev = [
    "pytest>=7.0.0",
]

[project.entry-points."napari.manifest"]
cellflow = "cellflow:napari.yaml"

# Analysis modules are discovered via this entry-point group.
# Third-party packages can register their own modules here.
# [project.entry-points."cellflow.analysis_modules"]
# my_module = "my_package:MyModule"

[tool.setuptools.packages.find]
include = ["cellflow*"]

[tool.setuptools.package-data]
cellflow = ["napari.yaml"]

[tool.pytest.ini_options]
testpaths = ["tests"]
