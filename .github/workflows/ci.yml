name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Qt/OpenGL system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libopengl0 libgl1 libglib2.0-0 libdbus-1-3 \
            libxkbcommon0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libxcb-cursor0

      - name: Install package and tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install build

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Build package
        run: python -m build --sdist --wheel --outdir dist

      - name: Build extracted distributions
        run: |
          python -m build --wheel packages/cellflow-core --outdir dist
          python -m build --wheel packages/cellflow-contact --outdir dist
          python -m build --wheel packages/cellflow-tracking --outdir dist
          python -m build --wheel packages/cellflow-segmentation --outdir dist

      - name: Verify isolated install (PEP 420 namespace + headless core)
        run: |
          python -m venv /tmp/cf-verify
          . /tmp/cf-verify/bin/activate
          pip install --upgrade pip
          pip install h5py numpy scipy scikit-image tifffile sqlalchemy pydantic
          pip install --no-deps dist/cellflow_core-*.whl dist/cellflow_contact-*.whl dist/cellflow_tracking-*.whl dist/cellflow_segmentation-*.whl
          python - <<'PY'
          import os, tempfile, numpy as np, tifffile, h5py
          import cellflow            # PEP 420 namespace, no orchestrator present
          import cellflow.core.tiff
          from cellflow.contact_analysis import build_contact_analysis
          d = tempfile.mkdtemp()
          labels = np.zeros((2, 5, 6), dtype=np.uint16)
          labels[:, :, :3] = 1
          labels[:, :, 3:] = 2
          cp = os.path.join(d, "cells.tif")
          tifffile.imwrite(cp, labels)
          out = build_contact_analysis(cell_labels_path=cp, output_path=os.path.join(d, "ca.h5"))
          with h5py.File(out) as h5:
              assert h5["cells/table/cell_id"][:].tolist() == [1, 2, 1, 2]
          print("isolated cellflow-contact install OK")

          # cellflow-tracking composes into the same namespace without the
          # orchestrator or the contact piece, and its headless backend imports.
          import cellflow.tracking_ultrack.db_build  # noqa: F401
          import cellflow.tracking_ultrack.validation_state as v
          import cellflow.correction.labels  # noqa: F401
          from cellflow.core.lineage import build_lineage
          from cellflow.core.cancellation import CancelledError  # noqa: F401
          from cellflow.tracking_ultrack.corrections import Correction
          nd = tempfile.mkdtemp()
          v.add_correction(nd, Correction(cell_id=7, t=0, kind="validated", y=1.0, x=2.0))
          assert v.read_validated_tracks(nd) == {7: {0}}
          assert os.path.exists(os.path.join(nd, "corrections.json"))
          lanes = build_lineage(labels)
          assert {lane.cell_id for lane in lanes.lanes} == {1, 2}
          print("isolated cellflow-tracking backend OK")

          # cellflow-segmentation composes into the same namespace on top of
          # cellflow-core alone (no tracking/contact/orchestrator), and its
          # headless divergence backend runs.
          from cellflow.segmentation import (
              CellDivergenceParams,
              segment_cells_divergence,
          )
          from cellflow.core.imageops import residual  # noqa: F401
          contours = np.abs(np.random.default_rng(0).normal(0, 1, (2, 12, 12))).astype("float32")
          foreground = np.clip(np.random.default_rng(1).normal(0.6, 0.1, (2, 12, 12)), 0, 1).astype("float32")
          nuc = np.zeros((2, 12, 12), np.uint32)
          nuc[:, 3:5, 3:5] = 1
          nuc[:, 8:10, 8:10] = 2
          res = segment_cells_divergence(contours, foreground, nuc, CellDivergenceParams())
          assert res.labels.shape == (2, 12, 12)
          print("isolated cellflow-segmentation backend OK")
          PY

      - name: Verify napari manifests validate
        run: |
          pip install npe2
          python - <<'PY'
          from npe2 import PluginManifest
          for path, name in [
              ("src/cellflow/napari.yaml", "cellflow"),
              ("src/cellflow/contact_analysis/napari.yaml", "cellflow-contact"),
              ("src/cellflow/tracking_ultrack/napari.yaml", "cellflow-tracking"),
              ("src/cellflow/segmentation/napari.yaml", "cellflow-segmentation"),
          ]:
              m = PluginManifest.from_file(path)
              assert m.name == name, (m.name, name)
              print("manifest OK:", m.name)

          # The full install folds each extracted piece's widget factory into the
          # single cellflow manifest; assert it mirrors the standalone factories.
          def factories(path):
              m = PluginManifest.from_file(path)
              return {c.python_name for c in m.contributions.commands}

          folded = factories("src/cellflow/napari.yaml")
          for path in (
              "src/cellflow/contact_analysis/napari.yaml",
              "src/cellflow/tracking_ultrack/napari.yaml",
              "src/cellflow/segmentation/napari.yaml",
          ):
              assert factories(path) <= folded, path
          print("folded manifest mirrors standalone factories OK")
          PY
