name: docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docs/**"
      - "src/itasc/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"

# Least privilege by default; the deploy job elevates what it needs.
permissions:
  contents: read

# Never let two Pages deploys race; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package + docs dependencies
        run: |
          python -m pip install --upgrade pip
          # Heavy/GUI deps are mocked in conf.py, so the bare package is enough.
          python -m pip install -e .[docs]

      - name: Build documentation
        # -W turns documentation drift (broken refs, deleted symbols, malformed
        # docstrings) into a failing check. The baseline build is warning-clean.
        run: |
          sphinx-build -b html -W --keep-going docs docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

  # Publish to GitHub Pages, but only for pushes to main. Pull requests still
  # run the build job above as a check; they just don't deploy.
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
