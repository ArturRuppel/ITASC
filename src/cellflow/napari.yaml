name: cellflow
display_name: CellFlow
contributions:
  commands:
    - id: cellflow.main_widget
      title: "CellFlow"
      python_name: cellflow.napari:CellFlowWidget
    # The full install folds the extracted pieces' widgets into this single
    # manifest. npe2 requires a manifest's name to match the providing
    # distribution, so the standalone cellflow-aggregate / cellflow-tracking /
    # cellflow-segmentation manifests cannot be re-registered from the cellflow
    # distribution; their contributions are mirrored here instead.
    - id: cellflow.cellpose_widget
      title: "Cellpose"
      python_name: cellflow.napari.cellpose_widget:make_cellpose_widget
    - id: cellflow.nucleus_tracking_widget
      title: "Nucleus Tracking & Correction"
      python_name: cellflow.napari.nucleus_workflow_widget:make_nucleus_tracking_widget
    - id: cellflow.cell_segmentation_widget
      title: "Cell Segmentation"
      python_name: cellflow.napari.cell_workflow_widget:make_cell_segmentation_widget
    # In a full install this single Aggregate Quantification entry resolves to the
    # merged studio (catalog + per-position view + analysis plugins); the standalone
    # cellflow-aggregate wheel resolves the same factory to the bare per-position
    # widget. Analysis plugins are NOT registered here — they are hosted
    # inside the Aggregate Quantification widget, not exposed as top-level dock
    # widgets, and register in-process by subclassing
    # cellflow.napari.aggregate_quantification.plugins.AnalysisPlugin.
    - id: cellflow.aggregate_quantification_widget
      title: "Aggregate Quantification"
      python_name: cellflow.napari.aggregate_quantification_widget:make_aggregate_quantification_widget
    # The cellflow-cellpose distribution's *standalone* surface — native-mask
    # segment + laptrack track + embedded basic correction. It is not part of the
    # integrated pipeline (the pipeline uses the Cellpose widget above); it is
    # mirrored here only so the full install can also reach the standalone tool.
    - id: cellflow.cellpose_segment_track_widget
      title: "Cellpose Segment + Track"
      python_name: cellflow.napari.cellpose_segment_track_widget:make_cellpose_segment_track_widget
  widgets:
    - command: cellflow.main_widget
      display_name: "CellFlow"
    - command: cellflow.cellpose_widget
      display_name: "Cellpose"
    - command: cellflow.nucleus_tracking_widget
      display_name: "Nucleus Tracking & Correction"
    - command: cellflow.cell_segmentation_widget
      display_name: "Cell Segmentation"
    - command: cellflow.aggregate_quantification_widget
      display_name: "Aggregate Quantification"
    - command: cellflow.cellpose_segment_track_widget
      display_name: "Cellpose Segment + Track"
