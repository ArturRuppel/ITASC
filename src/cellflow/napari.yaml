name: cellflow
display_name: CellFlow
contributions:
  commands:
    - id: cellflow.main_widget
      title: "CellFlow"
      python_name: cellflow.napari:CellFlowWidget
    # The full install folds the extracted tools' widgets into this single
    # manifest. npe2 requires a manifest's name to match the providing
    # distribution, so the standalone cellflow-cellpose / cellflow-tracking /
    # cellflow-aggregate manifests cannot be re-registered from the cellflow
    # distribution; their contributions are mirrored here instead. The integrated
    # CellFlow app's own per-stage widgets (Cellpose map-building, Cell
    # Segmentation) live inside the CellFlow widget above and are not exposed as
    # separate menu entries.
    - id: cellflow.nucleus_tracking_widget
      title: "Ultrack Segment + Track"
      python_name: cellflow.napari.nucleus_workflow_widget:make_nucleus_tracking_widget
    # The CellFlow Aggregate app: the full catalog UI restricted to the
    # Contact Analysis stage + Aggregate capstone (three-dot rail: cell labels,
    # nucleus labels, contact analysis). Both the full install and the standalone
    # cellflow-aggregate wheel resolve this same factory; the standalone simply
    # lacks the upstream segmentation/tracking distributions, so it always comes
    # up contact-only. In the full install this is the slim aggregate-focused
    # entry alongside the complete CellFlow widget above.
    - id: cellflow.contact_analysis_widget
      title: "CellFlow Aggregate"
      python_name: cellflow.napari.main_widget:make_aggregate_app_widget
    # The cellflow-cellpose distribution's *standalone* surface — native-mask
    # segment + laptrack track + embedded basic correction. It is not part of the
    # integrated pipeline (the pipeline uses the Cellpose widget above); it is
    # mirrored here only so the full install can also reach the standalone tool.
    - id: cellflow.cellpose_segment_track_widget
      title: "Cellpose Segment + Track"
      python_name: cellflow.napari.cellpose_segment_track_widget:make_cellpose_segment_track_widget
  widgets:
    - command: cellflow.main_widget
      display_name: "CellFlow"
    - command: cellflow.nucleus_tracking_widget
      display_name: "Ultrack Segment + Track"
    - command: cellflow.contact_analysis_widget
      display_name: "CellFlow Aggregate"
    - command: cellflow.cellpose_segment_track_widget
      display_name: "Cellpose Segment + Track"
