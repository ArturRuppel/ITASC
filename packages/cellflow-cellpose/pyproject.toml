[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cellflow-cellpose"
version = "0.2.0"
description = "CellFlow Cellpose: standalone Cellpose-SAM segment + laptrack tracking tool (napari)"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "AGPL-3.0"}
authors = [{name = "Artur Ruppel", email = "artur@ruppel.pro"}]
keywords = ["cell-tracking", "microscopy", "napari", "cellpose", "segmentation"]
dependencies = [
    "cellflow-core",
    "napari[all]>=0.4.18",
    "qtpy>=2.3.0",
    "numpy",
    "scipy",
    "scikit-image",
    "tifffile",
]

[project.optional-dependencies]
# The Cellpose-SAM model powers segmentation (native masks + the prob/dp maps);
# it is imported lazily and only needed to *generate* masks/maps. Importing the
# package — and the Qt-free tracking helpers — does not require it.
cellpose = [
    "cellpose>=4.0",
    "torch",
    "torchvision",
]
# laptrack links the per-frame native masks into tracked labels. Imported lazily
# inside track_laptrack.track_masks; install to enable the Track step.
laptrack = [
    "laptrack",
    "pandas",
]

[project.urls]
Homepage = "https://github.com/ArturRuppel/CellFlow"
Repository = "https://github.com/ArturRuppel/CellFlow"

[project.entry-points."napari.manifest"]
cellflow-cellpose = "cellflow.cellpose:napari.yaml"

# Built from the shared source tree without moving files; omits the namespace
# roots (cellflow/__init__.py, cellflow/napari/__init__.py) so it composes with
# cellflow-core via PEP 420. The cellpose / divergence-maps widgets depend only
# on shared primitives now shipped in cellflow-core. See cellflow-core for the
# namespace rationale.
[tool.hatch.build.targets.wheel]
bypass-selection = true

[tool.hatch.build.targets.wheel.force-include]
"../../src/cellflow/cellpose" = "cellflow/cellpose"
# The standalone surface is the segment+track widget (napari.yaml points here).
"../../src/cellflow/napari/cellpose_segment_track_widget.py" = "cellflow/napari/cellpose_segment_track_widget.py"
# cellpose_widget + divergence_maps_widget stay shipped (Qt-free of the model):
# the integrated app imports them directly for its in-app Cellpose stage; they
# are no longer the distro's standalone napari command but remain importable.
"../../src/cellflow/napari/cellpose_widget.py" = "cellflow/napari/cellpose_widget.py"
"../../src/cellflow/napari/divergence_maps_widget.py" = "cellflow/napari/divergence_maps_widget.py"
