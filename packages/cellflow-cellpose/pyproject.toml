[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cellflow-cellpose"
version = "0.2.0"
description = "CellFlow Cellpose stage: local Cellpose-SAM runner + divergence-based foreground/contour maps (napari)"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "GPL-3.0"}
authors = [{name = "Artur Ruppel", email = "artur@ruppel.pro"}]
keywords = ["cell-tracking", "microscopy", "napari", "cellpose", "segmentation"]
dependencies = [
    "cellflow-core",
    "napari[all]>=0.4.18",
    "qtpy>=2.3.0",
    "numpy",
    "scipy",
    "scikit-image",
    "tifffile",
]

[project.optional-dependencies]
# The Cellpose-SAM model powers the probability/flow step (cellpose_runner); it
# is imported lazily and only needed to *generate* the prob/dp maps. Building
# the divergence-derived foreground/contour maps from precomputed prob/dp does
# not require it.
cellpose = [
    "cellpose>=4.0",
    "torch",
    "torchvision",
]

[project.urls]
Homepage = "https://github.com/ArturRuppel/CellFlow"
Repository = "https://github.com/ArturRuppel/CellFlow"

[project.entry-points."napari.manifest"]
cellflow-cellpose = "cellflow.cellpose:napari.yaml"

# Built from the shared source tree without moving files; omits the namespace
# roots (cellflow/__init__.py, cellflow/napari/__init__.py) so it composes with
# cellflow-core via PEP 420. The cellpose / divergence-maps widgets depend only
# on shared primitives now shipped in cellflow-core. See cellflow-core for the
# namespace rationale.
[tool.hatch.build.targets.wheel]
bypass-selection = true

[tool.hatch.build.targets.wheel.force-include]
"../../src/cellflow/cellpose" = "cellflow/cellpose"
"../../src/cellflow/napari/cellpose_widget.py" = "cellflow/napari/cellpose_widget.py"
"../../src/cellflow/napari/divergence_maps_widget.py" = "cellflow/napari/divergence_maps_widget.py"
