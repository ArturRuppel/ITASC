[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cellflow-segmentation"
version = "0.2.0"
description = "CellFlow cell segmentation: divergence-based cell labels + interactive correction (napari)"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "GPL-3.0"}
authors = [{name = "Artur Ruppel", email = "artur@ruppel.pro"}]
keywords = ["cell-tracking", "microscopy", "napari", "segmentation"]
dependencies = [
    "cellflow-core",
    "napari[all]>=0.4.18",
    "qtpy>=2.3.0",
    "numpy",
    "scipy",
    "scikit-image",
    "tifffile",
]

[project.optional-dependencies]
# Cellpose powers the upstream probability/flow step (cellpose_runner); it is
# imported lazily and only needed to generate the foreground/contour maps the
# divergence segmentation consumes. Correction- or segmentation-only use of
# precomputed maps does not require it.
cellpose = [
    "cellpose>=4.0",
    "torch",
    "torchvision",
]

[project.urls]
Homepage = "https://github.com/ArturRuppel/CellFlow"
Repository = "https://github.com/ArturRuppel/CellFlow"

[project.entry-points."napari.manifest"]
cellflow-segmentation = "cellflow.segmentation:napari.yaml"

# Built from the shared source tree without moving files; omits the namespace
# roots (cellflow/__init__.py, cellflow/napari/__init__.py) so it composes with
# cellflow-core via PEP 420. The cell_workflow / cell_correction widgets depend
# only on the shared correction base now shipped in cellflow-core. See
# cellflow-core for the namespace rationale.
[tool.hatch.build.targets.wheel]
bypass-selection = true

[tool.hatch.build.targets.wheel.force-include]
"../../src/cellflow/segmentation" = "cellflow/segmentation"
"../../src/cellflow/napari/cell_workflow_widget.py" = "cellflow/napari/cell_workflow_widget.py"
"../../src/cellflow/napari/cell_correction_widget.py" = "cellflow/napari/cell_correction_widget.py"
