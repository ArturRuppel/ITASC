[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cellflow-analysis"
version = "0.1.0"
description = "CellFlow analysis backend and utilities"
requires-python = ">=3.9"
license = {text = "GPL-3.0"}
authors = [{name = "Artur Ruppel"}]
dependencies = [
    "numpy>=1.24.0",
    "scipy>=1.10.0",
    "scikit-image>=0.20.0",
    "networkx>=3.0",
    "matplotlib>=3.7.0",
    "opencv-python>=4.7.0",
    "pandas>=1.5.0",
    "tifffile>=2024.1.1",
    "h5py>=3.8.0",
    "PyYAML>=6.0",
    "cellflow-core",
]

[project.optional-dependencies]
dashboard = [
    "dash>=2.14.0",
    "plotly>=5.18.0",
]
forces = [
    "forsys>=1.0.0",
]
dev = [
    "pytest>=7.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/cellflow"]
