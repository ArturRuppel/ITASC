[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cellflow-aggregate"
version = "0.2.0"
description = "CellFlow aggregate quantification: per-position quantifiers (density, shape, dynamics, contacts: cell-cell edges, T1 events) and napari visualization"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "AGPL-3.0"}
authors = [{name = "Artur Ruppel", email = "artur@ruppel.pro"}]
keywords = ["cell-tracking", "microscopy", "napari", "quantification", "aggregate-quantification"]
dependencies = [
    "cellflow-core",
    "napari[all]>=0.4.18",
    "qtpy>=2.3.0",
    "h5py",
    "numpy",
    "pandas",
    "pyarrow",
    "scikit-image",
    "tifffile",
    "tomli>=2.0; python_version < '3.11'",
]

[project.urls]
Homepage = "https://github.com/ArturRuppel/CellFlow"
Repository = "https://github.com/ArturRuppel/CellFlow"

[project.entry-points."napari.manifest"]
cellflow-aggregate = "cellflow.contact_analysis:napari.yaml"

# Built from the shared source tree without moving files; omits the namespace
# roots so it composes with cellflow-core via PEP 420. See cellflow-core for the
# namespace rationale.
[tool.hatch.build.targets.wheel]
bypass-selection = true

[tool.hatch.build.targets.wheel.force-include]
"../../src/cellflow/contact_analysis" = "cellflow/contact_analysis"
"../../src/cellflow/napari/contact_analysis_widget.py" = "cellflow/napari/contact_analysis_widget.py"
"../../src/cellflow/napari/contact_visualization.py" = "cellflow/napari/contact_visualization.py"
