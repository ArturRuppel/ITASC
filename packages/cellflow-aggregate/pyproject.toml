[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cellflow-aggregate"
version = "0.2.0"
description = "CellFlow aggregate quantification: per-position quantifiers (density, shape, dynamics, contacts: cell-cell edges, T1 events) and napari visualization"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "AGPL-3.0"}
authors = [{name = "Artur Ruppel", email = "artur@ruppel.pro"}]
keywords = ["cell-tracking", "microscopy", "napari", "quantification", "aggregate-quantification"]
dependencies = [
    "cellflow-core",
    "napari[all]>=0.4.18",
    "qtpy>=2.3.0",
    "h5py",
    "numpy",
    "pandas",
    "pyarrow",
    "scikit-image",
    "tifffile",
    "tomli>=2.0; python_version < '3.11'",
]

[project.urls]
Homepage = "https://github.com/ArturRuppel/CellFlow"
Repository = "https://github.com/ArturRuppel/CellFlow"

[project.entry-points."napari.manifest"]
cellflow-aggregate = "cellflow.contact_analysis:napari.yaml"

# Built from the shared source tree without moving files; omits the namespace
# roots so it composes with cellflow-core via PEP 420. See cellflow-core for the
# namespace rationale.
[tool.hatch.build.targets.wheel]
bypass-selection = true

[tool.hatch.build.targets.wheel.force-include]
"../../src/cellflow/contact_analysis" = "cellflow/contact_analysis"
"../../src/cellflow/napari/contact_analysis_widget.py" = "cellflow/napari/contact_analysis_widget.py"
"../../src/cellflow/napari/contact_visualization.py" = "cellflow/napari/contact_visualization.py"
# The catalog app shell. The standalone aggregate app is the full CellFlow
# main widget restricted to the Contact Analysis stage (make_aggregate_app_widget
# passes upstream_stages=False); its upstream imports are guarded, so shipping
# main_widget here does not pull in cellflow-cellpose / cellflow-tracking. These
# napari modules are not owned by cellflow-core (the rail/status/panel cluster is
# coupled to contact_analysis.catalog) and no sibling wheel ships them, so the
# aggregate wheel owns them without collision.
"../../src/cellflow/napari/main_widget.py" = "cellflow/napari/main_widget.py"
"../../src/cellflow/napari/aggregate_widget.py" = "cellflow/napari/aggregate_widget.py"
"../../src/cellflow/napari/_experiments_panel.py" = "cellflow/napari/_experiments_panel.py"
"../../src/cellflow/napari/_status_rail.py" = "cellflow/napari/_status_rail.py"
"../../src/cellflow/napari/_stage_status.py" = "cellflow/napari/_stage_status.py"
"../../src/cellflow/napari/_stage_loader.py" = "cellflow/napari/_stage_loader.py"
"../../src/cellflow/napari/_icons.py" = "cellflow/napari/_icons.py"
